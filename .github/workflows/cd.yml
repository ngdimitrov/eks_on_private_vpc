name: CD

# Plan on every PR to main (read-only, no AWS mutations).
# Apply on push to main, gated by the `production` GitHub Environment.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Default: nothing. Each job opts into exactly what it needs.
permissions: {}

env:
  TERRAFORM_VERSION: 1.10.5
  AWS_REGION: eu-west-1

jobs:
  plan:
    name: terraform plan (read-only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    # Supersede stale plans when a PR is pushed again.
    concurrency:
      group: tf-plan-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      id-token: write # mint the OIDC token for AWS
      contents: read
      pull-requests: write # post the plan as a PR comment
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: terraform init
        working-directory: terraform
        run: terraform init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" -input=false

      - name: terraform plan
        id: plan
        working-directory: terraform
        run: |
          set -o pipefail
          terraform plan -lock=false -no-color -input=false \
            -var-file=environments/production.tfvars 2>&1 | tee plan.txt

      - name: Publish plan
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8');
            const body = [
              '#### Terraform Plan `${{ steps.plan.outcome }}`',
              '<details><summary>Show plan</summary>',
              '',
              '```terraform',
              plan.length > 60000 ? plan.slice(-60000) : plan,
              '```',
              '</details>',
            ].join('\n');
            core.summary.addRaw(body).write();
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  apply:
    name: terraform apply
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    environment: production # required-reviewer gate sits in front of the apply role
    # Serialize applies — never two `terraform apply` against one state at once.
    # The S3 native lock is the hard guard; this avoids the queued-run noise.
    concurrency:
      group: tf-apply
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: terraform init
        working-directory: terraform
        run: terraform init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" -input=false

      - name: terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve -input=false -var-file=environments/production.tfvars
