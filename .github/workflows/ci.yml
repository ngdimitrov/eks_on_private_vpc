name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

# Runner + action versions are pinned (no `latest`, no `@master`) so the
# pipeline doesn't break silently when an upstream maintainer ships a
# breaking change. Bump deliberately.
permissions:
  contents: read

env:
  TERRAFORM_VERSION: 1.15.2
  TFLINT_VERSION: v0.62.0
  CHECKOV_VERSION: 3.2.526
  # tfsec is deprecated and folded into Trivy; we run Trivy's config scanner.
  # The action tag is pinned inline at `uses:` (GitHub forbids expressions there).
  TRIVY_VERSION: v0.70.0
  KUBECONFORM_VERSION: v0.7.0
  KUBERNETES_VERSION: 1.35.0

jobs:
  terraform:
    name: terraform fmt + validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: terraform fmt
        working-directory: terraform
        run: terraform fmt -recursive -check -diff

      - name: terraform init (no backend)
        working-directory: terraform
        run: terraform init -backend=false -input=false

      - name: terraform validate
        working-directory: terraform
        run: terraform validate

  tflint:
    name: tflint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: tflint --recursive
        working-directory: terraform
        run: tflint --recursive --format compact

  checkov:
    name: checkov
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          quiet: true
          # Block the build on HIGH/CRITICAL; lower-severity, by-design items
          # (single NAT, 7-day KMS window, etc.) are documented in the README
          # and reported but non-blocking.
          soft_fail: true
          hard_fail_on: HIGH,CRITICAL

  trivy-config:
    name: trivy config
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Successor to tfsec: same intent — fail the build on HIGH/CRITICAL
      # Terraform misconfigurations.
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: terraform
          severity: HIGH,CRITICAL
          exit-code: "1"
          version: ${{ env.TRIVY_VERSION }}

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .

  kubeconform:
    name: kubeconform
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: install kubeconform
        run: |
          base="https://github.com/yannh/kubeconform/releases/download"
          curl -fsSL "${base}/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin kubeconform

      - run: |
          kubeconform -strict -summary \
            -kubernetes-version "${KUBERNETES_VERSION}" manifests/
