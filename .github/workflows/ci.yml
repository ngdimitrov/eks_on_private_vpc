name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

# Runner + action versions are pinned (no `latest`, no `@master`) so the
# pipeline doesn't break silently when an upstream maintainer ships a
# breaking change. Bump deliberately.
permissions:
  contents: read

env:
  TERRAFORM_VERSION: 1.10.5
  TFLINT_VERSION: v0.55.1
  CHECKOV_VERSION: 3.2.376
  TFSEC_VERSION: v1.28.14
  KUBECONFORM_VERSION: v0.6.7
  KUBERNETES_VERSION: 1.31.0

jobs:
  terraform:
    name: terraform fmt + validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: terraform fmt
        working-directory: terraform
        run: terraform fmt -recursive -check -diff

      - name: terraform init (no backend)
        working-directory: terraform
        run: terraform init -backend=false -input=false

      - name: terraform validate
        working-directory: terraform
        run: terraform validate

  tflint:
    name: tflint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: tflint --recursive
        working-directory: terraform
        run: tflint --recursive --format compact

  checkov:
    name: checkov
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          quiet: true
          soft_fail: true # findings documented in README; do not block CI

  tfsec:
    name: tfsec
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: true # findings documented in README; do not block CI

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .

  kubeconform:
    name: kubeconform
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: install kubeconform
        run: |
          base="https://github.com/yannh/kubeconform/releases/download"
          curl -fsSL "${base}/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin kubeconform

      - run: |
          kubeconform -strict -summary \
            -kubernetes-version "${KUBERNETES_VERSION}" manifests/
